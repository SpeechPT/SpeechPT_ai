issue_templates:
  - id: content_gap_high
    issue: content_gap
    severity: high
    text: "슬라이드 {slide_id}에서 중요한 설명({missed})이 충분히 드러나지 않았습니다. 다음 녹음에서는 이 슬라이드의 핵심을 먼저 한 문장으로 말해보세요."
  - id: content_gap_high_low_confidence
    issue: content_gap
    severity: low
    text: "슬라이드 {slide_id}는 분석 신뢰도가 낮아 일부 설명({missed})이 약하게 잡혔습니다. 핵심 슬라이드라면 시작할 때 주요 내용을 한 문장으로 먼저 말해보세요."
  - id: content_gap_mid
    issue: content_gap
    severity: medium
    text: "슬라이드 {slide_id}의 일부 핵심 내용({missed})이 짧게 지나갔습니다. 중요한 부분이라면 예시나 한 문장 설명을 덧붙여보세요."
  - id: content_gap_mid_low_confidence
    issue: content_gap
    severity: low
    text: "슬라이드 {slide_id}의 일부 내용({missed})은 분석상 약하게 잡혔습니다. 실제 누락으로 단정하기보다는, 다음 녹음에서 해당 내용을 한 문장으로 더 분명하게 말해보세요."
  - id: content_gap_low
    issue: content_gap
    severity: low
    text: "슬라이드 {slide_id}에서 {missed} 설명이 짧게 지나갔습니다. 중요하다면 한 번 더 풀어서 말하면 전달력이 좋아집니다."
  - id: content_gap_low_low_confidence
    issue: content_gap
    severity: low
    text: "슬라이드 {slide_id}에서 {missed} 관련 설명이 짧게 측정되었습니다. 중요 내용이라면 청중이 바로 이해할 수 있게 한 번 더 풀어 말해보세요."
  - id: title_missing
    issue: title_missing
    severity: high
    text: "슬라이드 {slide_id}의 주제({missed})가 충분히 드러나지 않았습니다. 이 슬라이드가 무엇을 말하는지 먼저 한 문장으로 알려주세요."
  - id: title_missing_low_confidence
    issue: title_missing
    severity: low
    text: "슬라이드 {slide_id}의 주제({missed})가 분석상 약하게 잡혔습니다. 실제 누락으로 단정하기보다는, 슬라이드 시작 시 주제를 한 문장으로 먼저 말하면 더 안정적입니다."
  - id: bullet_missing
    issue: bullet_missing
    severity: medium
    text: "슬라이드 {slide_id}의 세부 내용({missed}) 설명이 부족해 보입니다. 제목만 말하고 넘어가기보다 중요한 항목을 순서대로 짚어주세요."
  - id: bullet_missing_low_confidence
    issue: bullet_missing
    severity: low
    text: "슬라이드 {slide_id}의 세부 내용({missed})이 분석상 약하게 측정되었습니다. 중요한 항목이라면 순서대로 짚는 연습을 권장합니다."
  - id: visual_not_explained
    issue: visual_not_explained
    severity: medium
    text: "슬라이드 {slide_id}의 시각자료 핵심({visual_missed}) 설명이 부족합니다. 차트/이미지 의미를 한 문장으로 명확히 설명하세요."
  - id: visual_not_explained_low_confidence
    issue: visual_not_explained
    severity: low
    text: "슬라이드 {slide_id}의 시각자료 관련 내용({visual_missed})은 자동 매칭에서 약하게 잡혔습니다. 차트나 이미지가 핵심이라면 의미를 한 문장으로 덧붙여보세요."
  - id: coverage_good
    issue: coverage_good
    severity: low
    text: "슬라이드 {slide_id}는 슬라이드 내용과 설명이 잘 이어졌습니다. 현재 흐름을 유지하세요."

  - id: speed_drop
    issue: speed_drop
    severity: medium
    text: "슬라이드 {slide_id} 구간에서 말속도가 눈에 띄게 느려졌습니다( {rate_change} ). 리듬을 일정하게 유지해 보세요."
  - id: speed_rise
    issue: speed_rise
    severity: medium
    text: "슬라이드 {slide_id}에서 속도가 급해졌습니다( {rate_change} ). 핵심 문장은 한 템포씩 끊어주세요."
  - id: pacing_stable
    issue: pacing_stable
    severity: low
    text: "슬라이드 {slide_id}의 속도는 안정적입니다. 현재 템포를 유지하세요."
  - id: pacing_inconsistent
    issue: pacing_inconsistent
    severity: medium
    text: "슬라이드 {slide_id}에서 속도 기복이 큽니다(CV={rate_change}). 호흡 포인트를 미리 잡아 균형을 맞춰보세요."

  - id: silence_excess
    issue: silence_excess
    severity: low
    text: "슬라이드 {slide_id}에서 말이 멈춘 시간이 다소 길었습니다( {silence_duration} ). 짧은 전환 멘트를 준비해 흐름이 끊기지 않게 해보세요."
  - id: silence_good
    issue: silence_good
    severity: low
    text: "적절한 멈춤이 있어 이해를 돕습니다. 이 리듬을 유지하세요."

  - id: energy_drop
    issue: energy_drop
    severity: medium
    text: "슬라이드 {slide_id}에서 목소리 힘이 약해지는 구간이 있습니다. 중요한 문장은 조금 더 또렷하게 말해보세요."
  - id: energy_rise
    issue: energy_rise
    severity: low
    text: "에너지가 높아 청중의 주의를 끌었습니다. 다음 슬라이드에서도 균형 있게 유지하세요."

  - id: pitch_shift
    issue: pitch_shift
    severity: low
    text: "슬라이드 {slide_id}에서 목소리 톤이 크게 오르내립니다. 중요한 문장은 톤을 조금 안정적으로 유지해보세요."

  - id: filler_many
    issue: filler_many
    severity: medium
    text: "슬라이드 {slide_id}에서 추임새가 잦았습니다(총 {filler_count}회). 말하기 전에 짧은 침묵으로 대체해보세요."
  - id: filler_few
    issue: filler_few
    severity: low
    text: "추임새 사용이 적절합니다. 자연스러운 흐름을 유지하세요."

  - id: dwell_short
    issue: dwell_short
    severity: low
    text: "슬라이드 {slide_id}는 발표 시간의 {dwell_ratio_pct}%만 사용했습니다. 핵심 슬라이드라면 한두 문장 더 덧붙여도 좋습니다."
  - id: dwell_long
    issue: dwell_long
    severity: low
    text: "슬라이드 {slide_id}는 발표 시간의 {dwell_ratio_pct}%를 사용했습니다. 길게 설명한 만큼 핵심 메시지가 선명한지 점검해보세요."

  - id: change_point_dense
    issue: change_point_dense
    severity: medium
    text: "슬라이드 {slide_id} 구간에 변화점이 많아( {cp_count}회 ) 흐름이 다소 끊깁니다. 핵심 전환만 강조하세요."
  - id: change_point_smooth
    issue: change_point_smooth
    severity: low
    text: "변화점 분포가 안정적입니다. 현재 전환 템포를 유지하세요."

  - id: overall_strong
    issue: overall_strong
    severity: low
    text: "전체적으로 슬라이드 내용과 설명이 잘 이어지고 전달도 안정적입니다. 현재 방식을 유지하세요."
  - id: overall_mixed
    issue: overall_mixed
    severity: medium
    text: "슬라이드 설명은 대체로 이어지지만 말하기 흐름이 다소 흔들립니다. 속도와 멈춤 구간을 조정해보세요."
  - id: overall_weak
    issue: overall_weak
    severity: high
    text: "슬라이드 설명과 말하기 흐름 모두 개선 여지가 큽니다. 핵심 설명, 말속도, 목소리 힘을 우선 점검해보세요."

summary_templates:
  - id: summary_high
    text: "발표가 자료와 잘 맞으며 전달도 안정적입니다. 작은 디테일을 다듬으면 더욱 설득력 있는 발표가 됩니다."
  - id: summary_mid
    text: "핵심은 전달되지만 일부 슬라이드에서 속도나 침묵이 흔들립니다. 전환부 연습을 추천합니다."
  - id: summary_low
    text: "여러 슬라이드에서 설명 연결과 말하기 흐름이 함께 흔들립니다. 스크립트와 호흡 계획을 다시 정리해보세요."
